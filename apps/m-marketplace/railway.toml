[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/m-marketplace"
watchPatterns = ["apps/m-marketplace/**", "packages/**"]

[deploy]
startCommand = "cd apps/m-marketplace && node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
