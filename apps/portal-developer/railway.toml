[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter portal-developer build"
watchPatterns = ["apps/portal-developer/**", "packages/**"]

[deploy]
startCommand = "cd apps/portal-developer && node .next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
