[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo build --filter=./apps/portal-developer"
watchPatterns = ["apps/portal-developer/**", "packages/**"]

[deploy]
startCommand = "cd apps/portal-developer && npx next start -p ${PORT:-3003}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
