[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo build --filter=./apps/portal-owner"
watchPatterns = ["apps/portal-owner/**", "packages/**"]

[deploy]
startCommand = "cd apps/portal-owner && npx next start -p ${PORT:-3001}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
