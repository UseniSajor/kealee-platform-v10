[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm --filter portal-owner build"
watchPatterns = ["apps/portal-owner/**", "packages/**"]

[deploy]
startCommand = "cd apps/portal-owner && node .next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
