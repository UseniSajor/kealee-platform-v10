[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/portal-contractor"
watchPatterns = ["apps/portal-contractor/**", "packages/**"]

[deploy]
startCommand = "cd apps/portal-contractor && npx next start -p ${PORT:-3002}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
