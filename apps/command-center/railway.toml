[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter command-center build"
watchPatterns = ["apps/command-center/**", "packages/**"]

[deploy]
startCommand = "cd apps/command-center && node .next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
