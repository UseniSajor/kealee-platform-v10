[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo build --filter=./apps/command-center"
watchPatterns = ["apps/command-center/**", "packages/**"]

[deploy]
startCommand = "cd apps/command-center && npx next start -p ${PORT:-3004}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
