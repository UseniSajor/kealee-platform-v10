[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/web-main && cp -r apps/web-main/.next/static apps/web-main/.next/standalone/.next/static && cp -r apps/web-main/public apps/web-main/.next/standalone/public 2>/dev/null || true"
watchPatterns = ["apps/web-main/**", "packages/**"]

[deploy]
startCommand = "node apps/web-main/.next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
