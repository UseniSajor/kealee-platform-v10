[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/web-main"
watchPatterns = ["apps/web-main/**", "packages/**"]

[deploy]
startCommand = "cd apps/web-main && npx next start -p ${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
