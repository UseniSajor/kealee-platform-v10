[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/admin-console"
watchPatterns = ["apps/admin-console/**", "packages/**"]

[deploy]
startCommand = "cd apps/admin-console && npx next start -p ${PORT:-3005}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
