[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm --filter admin-console build"
watchPatterns = ["apps/admin-console/**", "packages/**"]

[deploy]
startCommand = "cd apps/admin-console && node .next/standalone/server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
