# PostgreSQL Configuration File
# Optimized for Kealee Platform Production
# Generated: 2026-01-15

# ============================================================================
# CONNECTION SETTINGS
# ============================================================================

max_connections = 200
superuser_reserved_connections = 3

# ============================================================================
# MEMORY SETTINGS
# ============================================================================

# Shared memory buffers (25% of RAM for 16GB system)
shared_buffers = 4GB

# Effective cache size (50-75% of RAM)
effective_cache_size = 12GB

# Memory for maintenance operations
maintenance_work_mem = 1GB

# Memory for query operations (calculated: (effective_cache_size - shared_buffers) / max_connections)
work_mem = 64MB

# ============================================================================
# WRITE-AHEAD LOG (WAL)
# ============================================================================

wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# ============================================================================
# QUERY PLANNER
# ============================================================================

default_statistics_target = 100
random_page_cost = 1.1              # For SSD storage
effective_io_concurrency = 200       # For SSD storage

# ============================================================================
# PARALLEL PROCESSING
# ============================================================================

max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ============================================================================
# LOGGING
# ============================================================================

logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000    # Log queries taking > 1 second
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ============================================================================
# AUTOVACUUM
# ============================================================================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s

# ============================================================================
# LOCALE AND FORMATTING
# ============================================================================

datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'
