# Redis Configuration File
# Optimized for Kealee Platform Production
# Generated: 2026-01-15

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================

# Maximum memory usage (2GB for production)
maxmemory 2gb

# Eviction policy when maxmemory is reached
# allkeys-lru: Evict least recently used keys
maxmemory-policy allkeys-lru

# ============================================================================
# PERSISTENCE (SNAPSHOTS)
# ============================================================================

# Save the DB to disk
# Format: save <seconds> <changes>
# Save if at least 1 key changed in 900 seconds (15 minutes)
save 900 1

# Save if at least 10 keys changed in 300 seconds (5 minutes)
save 300 10

# Save if at least 10000 keys changed in 60 seconds (1 minute)
save 60 10000

# ============================================================================
# APPEND ONLY FILE (AOF)
# ============================================================================

# Enable AOF persistence
appendonly yes

# AOF sync policy
# everysec: fsync every second (good balance)
appendfsync everysec

# ============================================================================
# NETWORK
# ============================================================================

# TCP keepalive (seconds)
tcp-keepalive 300

# Client timeout (seconds)
timeout 300

# ============================================================================
# LOGGING
# ============================================================================

# Log level: notice (production), verbose (debug)
loglevel notice

# Log file
logfile ""

# ============================================================================
# PERFORMANCE
# ============================================================================

# Disable some commands for security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# Maximum number of clients
maxclients 10000
