# Nixpacks Configuration for Kealee Platform Monorepo
# Forces pnpm, disables npm, uses Turbo for builds

[providers]
node = "20"

[phases.setup]
# Install pnpm package manager
nixPkgs = ["nodejs", "pnpm"]

[phases.install]
# Use pnpm ONLY (not npm) with frozen lockfile
cmds = [
  "pnpm --version",
  "pnpm install --frozen-lockfile"
]

[phases.build]
# Build entire monorepo using Turbo
cmds = [
  "pnpm build"
]

[env]
# Production environment
NODE_ENV = "production"
NPM_CONFIG_PRODUCTION = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"

# CRITICAL: Disable npm, force pnpm
npm_config_package_manager = "pnpm"
PNPM_HOME = "/root/.local/share/pnpm"
PATH = "/root/.local/share/pnpm:$PATH"
