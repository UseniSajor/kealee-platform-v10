# Nixpacks Configuration for pnpm Monorepo
# Use pnpm from nixpkgs for reliable PATH resolution

[providers]
# Use Node.js 20 LTS with pnpm from nixpkgs
node = "20"

[env]
# Production settings
NODE_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"

[phases.setup]
# Install pnpm from nixpkgs (not via npm)
nixPkgs = ["nodejs", "pnpm"]
cmds = [
  "pnpm --version"
]

[phases.install]
# Install dependencies with pnpm (monorepo mode)
cmds = [
  "pnpm install --frozen-lockfile"
]

[phases.build]
# Build entire workspace
cmds = [
  "pnpm build"
]
