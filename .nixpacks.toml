[build]
# Use pnpm for monorepo builds (critical!)
cmd = "pnpm install --frozen-lockfile && pnpm build"

[start]
# Start command for API/Worker services
cmd = "pnpm start"

[providers]
node = "20"

[phases.setup]
# Ensure pnpm is available
nixPkgs = ["nodejs", "pnpm"]

[phases.install]
# Force pnpm with frozen lockfile
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# Build with pnpm/turbo
cmds = ["pnpm build"]

[env]
# Production settings
NODE_ENV = "production"
NPM_CONFIG_PRODUCTION = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
