# KEALEE AI-LEARNING — Railway Configuration
# Set "Root Directory" to "/" (repo root) in Railway dashboard.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/ai-learning/Dockerfile"

[deploy]
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 15
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"
