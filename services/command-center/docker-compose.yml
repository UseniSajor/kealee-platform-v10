# KEALEE COMMAND CENTER - DOCKER COMPOSE
# Local development and testing environment

version: '3.8'

services:
  # ============================================================================
  # API GATEWAY
  # ============================================================================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/gateway/src/server.js
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://kealee:kealee_dev@postgres:5432/kealee_command_center
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - command-center

  # ============================================================================
  # WORKER ORCHESTRATION
  # ============================================================================
  workers:
    build:
      context: .
      dockerfile: Dockerfile
    command: node dist/workers/src/main.js
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://kealee:kealee_dev@postgres:5432/kealee_command_center
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GOOGLE_CALENDAR_CLIENT_ID=${GOOGLE_CALENDAR_CLIENT_ID}
      - GOOGLE_CALENDAR_CLIENT_SECRET=${GOOGLE_CALENDAR_CLIENT_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2
    networks:
      - command-center

  # ============================================================================
  # REDIS (Job Queues & Event Bus)
  # ============================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - command-center

  # ============================================================================
  # POSTGRESQL (Database)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=kealee
      - POSTGRES_PASSWORD=kealee_dev
      - POSTGRES_DB=kealee_command_center
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kealee -d kealee_command_center"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - command-center

  # ============================================================================
  # BULL BOARD (Queue Dashboard)
  # ============================================================================
  bullboard:
    image: deadly0/bull-board
    ports:
      - "3002:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BULL_PREFIX=kealee
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - command-center

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  command-center:
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  redis_data:
  postgres_data:
