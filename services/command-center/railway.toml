[build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && DATABASE_URL='postgresql://placeholder:placeholder@localhost:5432/placeholder' pnpm --filter @kealee/database db:generate && pnpm turbo build --filter=./services/command-center"
watchPatterns = ["services/command-center/**", "packages/**"]

[deploy]
numReplicas = 1
startCommand = "cd services/command-center && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
PORT = "3001"
HOST = "0.0.0.0"
