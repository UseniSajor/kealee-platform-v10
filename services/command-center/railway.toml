# KEALEE COMMAND CENTER - RAILWAY CONFIGURATION
# Deploy to Railway.app
# NOTE: The Dockerfile builds from the monorepo root to resolve workspace:* deps.
# In Railway, set the "Root Directory" to "/" (repo root), NOT "services/command-center".

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/command-center/Dockerfile"

[deploy]
numReplicas = 1

# Health check
healthcheckPath = "/health"
healthcheckTimeout = 10

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
PORT = "3001"
HOST = "0.0.0.0"
