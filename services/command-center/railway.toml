# KEALEE COMMAND CENTER - RAILWAY CONFIGURATION
# Deploy to Railway.app
# Dockerfile is self-contained — build context is services/command-center/ (Railway default).
# Workspace deps replaced with local/ file: references, no monorepo root needed.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1

# Health check
healthcheckPath = "/health"
healthcheckTimeout = 10

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
PORT = "3001"
HOST = "0.0.0.0"
