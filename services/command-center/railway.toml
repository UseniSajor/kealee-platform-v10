# KEALEE COMMAND CENTER - RAILWAY CONFIGURATION
# Deploy to Railway.app
#
# IMPORTANT: Set Railway Root Directory to / (repo root) in the Railway dashboard.
# Go to: Railway dashboard → service → Settings → Source → Root Directory → clear to "/"
# dockerfilePath below is relative to that root directory.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/command-center/Dockerfile"

[deploy]
numReplicas = 1

# Health check
healthcheckPath = "/health"
healthcheckTimeout = 10

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
PORT = "3001"
HOST = "0.0.0.0"
