name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Build packages
        run: |
          pnpm run -r --filter=@kealee/database --filter=@kealee/auth build
          pnpm build --filter=@kealee/api

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: api

  deploy-vercel:
    name: Deploy Apps to Vercel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: m-marketplace
            filter: '@kealee/m-marketplace'
            project_id: ${{ secrets.VERCEL_PROJECT_ID_MARKETPLACE }}
          - name: m-project-owner
            filter: m-project-owner
            project_id: ${{ secrets.VERCEL_PROJECT_ID_PROJECT_OWNER }}
          - name: m-permits-inspections
            filter: m-permits-inspections
            project_id: ${{ secrets.VERCEL_PROJECT_ID_PERMITS }}
          - name: m-ops-services
            filter: m-ops-services
            project_id: ${{ secrets.VERCEL_PROJECT_ID_OPS_SERVICES }}
          - name: m-architect
            filter: m-architect
            project_id: ${{ secrets.VERCEL_PROJECT_ID_ARCHITECT }}
          - name: os-pm
            filter: os-pm
            project_id: ${{ secrets.VERCEL_PROJECT_ID_OS_PM }}
          - name: os-admin
            filter: os-admin
            project_id: ${{ secrets.VERCEL_PROJECT_ID_OS_ADMIN }}
          - name: m-estimation
            filter: m-estimation
            project_id: ${{ secrets.VERCEL_PROJECT_ID_ESTIMATION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ matrix.app.project_id }}
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ matrix.app.project_id }}
          working-directory: apps/${{ matrix.app.name }}
          vercel-args: '--prod --yes'
          scope: ${{ secrets.VERCEL_ORG_ID }}




