name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache Turbo build artifacts
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-api-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-api-${{ hashFiles('**/pnpm-lock.yaml') }}-
            turbo-api-

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Build packages
        run: |
          pnpm run -r --filter=@kealee/database --filter=@kealee/auth build
          pnpm build --filter=@kealee/api

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: api

  deploy-portals:
    name: Deploy Portal Apps to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: portal-owner
            service: portal-owner
          - app: portal-contractor
            service: portal-contractor
          - app: portal-developer
            service: portal-developer
          - app: command-center
            service: command-center
          - app: web-main
            service: web-main
          - app: admin-console
            service: admin-console
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.app }} to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ matrix.service }}

  deploy-legacy-apps:
    name: Deploy Legacy Apps to Vercel - ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      matrix:
        app:
          - m-marketplace
          - m-project-owner
          - m-permits-inspections
          - m-ops-services
          - m-architect
          - os-pm
          - os-admin
          - m-estimation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Resolve Vercel project ID
        id: project
        run: |
          case "${{ matrix.app }}" in
            m-marketplace)          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_MARKETPLACE }}" ;;
            m-project-owner)        PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_PROJECT_OWNER }}" ;;
            m-permits-inspections)  PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_PERMITS }}" ;;
            m-ops-services)         PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OPS_SERVICES }}" ;;
            m-architect)            PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_ARCHITECT }}" ;;
            os-pm)                  PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OS_PM }}" ;;
            os-admin)               PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OS_ADMIN }}" ;;
            m-estimation)           PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_ESTIMATION }}" ;;
          esac
          echo "id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ steps.project.outputs.id }}
          working-directory: apps/${{ matrix.app }}
          vercel-args: '--prod --yes'
          scope: ${{ secrets.VERCEL_ORG_ID }}
