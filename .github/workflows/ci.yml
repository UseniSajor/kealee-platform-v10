name: CI Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate 1: Type checking and linting
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @kealee/database run db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @kealee/shared run build
          pnpm --filter @kealee/storage run build

      - name: Build Next.js apps
        run: |
          pnpm --filter web-main run build
          pnpm --filter portal-owner run build
          pnpm --filter portal-contractor run build
          pnpm --filter portal-developer run build
          pnpm --filter command-center run build
          pnpm --filter admin-console run build

      - name: Type check API
        run: pnpm --filter @kealee/api run build:ts

  # Gate 2: Unit tests (parallel with typecheck)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @kealee/database run db:generate

      - name: Run API unit tests
        run: pnpm --filter @kealee/api run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kealee_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
