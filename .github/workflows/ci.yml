name: CI Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate 1: Type checking and linting
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @kealee/database run db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @kealee/shared run build
          pnpm --filter @kealee/storage run build
          pnpm --filter @kealee/estimating run build
          pnpm --filter @kealee/workflow-engine run build

      - name: Build Next.js apps
        run: |
          pnpm --filter web-main run build
          pnpm --filter portal-owner run build
          pnpm --filter portal-contractor run build
          pnpm --filter portal-developer run build
          pnpm --filter command-center run build
          pnpm --filter admin-console run build

      - name: Type check API
        run: pnpm --filter @kealee/api run build:ts

  # Gate 2: Unit tests (parallel with typecheck)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @kealee/database run db:generate

      - name: Run API unit tests
        run: pnpm --filter @kealee/api run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kealee_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key

  # Gate 3: Integration tests (needs DB + Redis)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kealee_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @kealee/database run db:generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kealee_test
        run: cd packages/database && npx prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kealee_test
          REDIS_URL: redis://localhost:6379
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
        run: pnpm --filter @kealee/api run test:integration

  # Gate 4: Smoke test production after deploy (main only)
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Wait for Railway deploy
        run: sleep 60

      - name: Run smoke tests against production
        env:
          API_URL: https://api.kealee.com
        run: node scripts/smoke-test.mjs
