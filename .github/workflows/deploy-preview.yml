name: Deploy Preview to Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - staging
  push:
    branches:
      - preview
      - preview-*

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        app:
          - m-marketplace
          - m-project-owner
          - m-permits-inspections
          - m-ops-services
          - m-architect
          - os-pm
          - os-admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Project ID
        id: project
        env:
          PROJECT_ID_MARKETPLACE: ${{ secrets.VERCEL_PROJECT_ID_MARKETPLACE }}
          PROJECT_ID_PROJECT_OWNER: ${{ secrets.VERCEL_PROJECT_ID_PROJECT_OWNER }}
          PROJECT_ID_PERMITS: ${{ secrets.VERCEL_PROJECT_ID_PERMITS }}
          PROJECT_ID_OPS_SERVICES: ${{ secrets.VERCEL_PROJECT_ID_OPS_SERVICES }}
          PROJECT_ID_ARCHITECT: ${{ secrets.VERCEL_PROJECT_ID_ARCHITECT }}
          PROJECT_ID_OS_PM: ${{ secrets.VERCEL_PROJECT_ID_OS_PM }}
          PROJECT_ID_OS_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_OS_ADMIN }}
        run: |
          case "${{ matrix.app }}" in
            "m-marketplace")
              echo "project_id=$PROJECT_ID_MARKETPLACE" >> $GITHUB_OUTPUT
              ;;
            "m-project-owner")
              echo "project_id=$PROJECT_ID_PROJECT_OWNER" >> $GITHUB_OUTPUT
              ;;
            "m-permits-inspections")
              echo "project_id=$PROJECT_ID_PERMITS" >> $GITHUB_OUTPUT
              ;;
            "m-ops-services")
              echo "project_id=$PROJECT_ID_OPS_SERVICES" >> $GITHUB_OUTPUT
              ;;
            "m-architect")
              echo "project_id=$PROJECT_ID_ARCHITECT" >> $GITHUB_OUTPUT
              ;;
            "os-pm")
              echo "project_id=$PROJECT_ID_OS_PM" >> $GITHUB_OUTPUT
              ;;
            "os-admin")
              echo "project_id=$PROJECT_ID_OS_ADMIN" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Starting deployment for ${{ matrix.app }}
        run: |
          echo "Starting Preview Deployment: ${{ matrix.app }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Project ID: ${{ steps.project.outputs.project_id }}"

      - name: Install dependencies
        run: |
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel Project
        working-directory: apps/${{ matrix.app }}
        run: |
          mkdir -p .vercel
          echo '{"projectId":"${{ steps.project.outputs.project_id }}","orgId":"${{ env.VERCEL_ORG_ID }}"}' > .vercel/project.json

      - name: Deploy to Vercel Preview
        id: deploy
        working-directory: apps/${{ matrix.app }}
        run: |
          DEPLOYMENT_URL=$(vercel deploy --yes --token=${{ env.VERCEL_TOKEN }} --scope=${{ env.VERCEL_ORG_ID }} 2>&1 | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | head -n 1 || echo "")

          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
            echo "Preview URL: $DEPLOYMENT_URL"
          else
            echo "Deployment completed - check Vercel dashboard for URL"
          fi

      - name: Comment PR with Deployment Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const appName = '${{ matrix.app }}';
            let body = url
              ? `馃殌 **${appName}** deployed: [Preview](${url})`
              : `馃殌 **${appName}** deployed - check Vercel dashboard`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  notify-deployment:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Preview Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "### Apps Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- m-marketplace" >> $GITHUB_STEP_SUMMARY
          echo "- m-project-owner" >> $GITHUB_STEP_SUMMARY
          echo "- m-permits-inspections" >> $GITHUB_STEP_SUMMARY
          echo "- m-ops-services" >> $GITHUB_STEP_SUMMARY
          echo "- m-architect" >> $GITHUB_STEP_SUMMARY
          echo "- os-pm" >> $GITHUB_STEP_SUMMARY
          echo "- os-admin" >> $GITHUB_STEP_SUMMARY
