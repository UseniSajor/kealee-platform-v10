name: Deploy Preview to Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - staging

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

jobs:
  deploy-preview:
    name: Deploy Preview - ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        app:
          - m-marketplace
          - m-project-owner
          - m-permits-inspections
          - m-ops-services
          - m-architect
          - os-pm
          - os-admin
          - m-estimation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Resolve Vercel project ID
        id: project
        run: |
          case "${{ matrix.app }}" in
            m-marketplace)          PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_MARKETPLACE }}" ;;
            m-project-owner)        PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_PROJECT_OWNER }}" ;;
            m-permits-inspections)  PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_PERMITS }}" ;;
            m-ops-services)         PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OPS_SERVICES }}" ;;
            m-architect)            PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_ARCHITECT }}" ;;
            os-pm)                  PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OS_PM }}" ;;
            os-admin)               PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_OS_ADMIN }}" ;;
            m-estimation)           PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_ESTIMATION }}" ;;
          esac
          echo "id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ steps.project.outputs.id }}
          working-directory: apps/${{ matrix.app }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
