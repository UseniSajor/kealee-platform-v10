name: Deploy Preview to Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - staging
  push:
    branches:
      - preview
      - preview-*

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: m-marketplace
            project-id: ${{ secrets.VERCEL_PROJECT_ID_MARKETPLACE }}
          - name: m-project-owner
            project-id: ${{ secrets.VERCEL_PROJECT_ID_PROJECT_OWNER }}
          - name: m-permits-inspections
            project-id: ${{ secrets.VERCEL_PROJECT_ID_PERMITS }}
          - name: m-ops-services
            project-id: ${{ secrets.VERCEL_PROJECT_ID_OPS_SERVICES }}
          - name: m-architect
            project-id: ${{ secrets.VERCEL_PROJECT_ID_ARCHITECT }}
          - name: os-pm
            project-id: ${{ secrets.VERCEL_PROJECT_ID_OS_PM }}
          - name: os-admin
            project-id: ${{ secrets.VERCEL_PROJECT_ID_OS_ADMIN }}
          - name: m-estimation
            project-id: ${{ secrets.VERCEL_PROJECT_ID_ESTIMATION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 🚀 Starting deployment for ${{ matrix.app.name }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Starting Preview Deployment: ${{ matrix.app.name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⏰ Started at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "📍 Branch: ${{ github.ref_name }}"
          echo "📦 App: ${{ matrix.app.name }}"
          echo "🆔 Project ID: ${{ matrix.app.project-id }}"
          if [ "${{ matrix.app.name }}" = "os-admin" ]; then
            echo "✅ OS-ADMIN: Deployment confirmed in workflow"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: Install Vercel CLI
        run: |
          echo "📥 Installing Vercel CLI..."
          npm install --global vercel@latest
          echo "✅ Vercel CLI installed: $(vercel --version)"

      - name: Verify Monorepo Structure
        run: |
          echo "🔍 Verifying monorepo structure..."
          echo "📁 Root directory: $(pwd)"
          echo "📁 Checking for required files:"
          ls -la | grep -E "package.json|pnpm-workspace.yaml|turbo.json" || echo "⚠️ Some root files missing"
          echo "📁 App directory exists:"
          ls -la apps/${{ matrix.app.name }} || echo "❌ App directory not found!"
          echo "✅ Structure verified"

      - name: Validate vercel.json Schema
        working-directory: apps/${{ matrix.app.name }}
        run: |
          echo "🔍 Validating vercel.json schema for ${{ matrix.app.name }}..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ ! -f "vercel.json" ]; then
            echo "❌ ERROR: vercel.json not found in apps/${{ matrix.app.name }}!"
            echo "💡 Create vercel.json with proper configuration"
            exit 1
          fi
          
          # Check for invalid properties
          echo "📋 Checking for invalid properties in vercel.json..."
          
          # Check for _comment property (not allowed in Vercel schema)
          if grep -q '"_comment"' vercel.json || grep -q "'_comment'" vercel.json || grep -qi "comment" vercel.json; then
            echo "❌ ERROR: vercel.json contains invalid property!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 Found invalid property in vercel.json:"
            grep -n -i "comment" vercel.json || true
            echo ""
            echo "💡 Fix: Remove all '_comment' or 'comment' properties from vercel.json"
            echo "💡 Vercel JSON schema does not allow custom properties like '_comment'"
            echo ""
            echo "📄 Full vercel.json content:"
            cat vercel.json
            echo ""
            echo "🔗 Vercel Dashboard: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/settings/build-and-deployment"
            echo "💡 Also check Vercel dashboard settings for any '_comment' fields"
            exit 1
          fi
          
          # Validate JSON syntax
          echo "📋 Validating JSON syntax..."
          if ! python3 -m json.tool vercel.json > /dev/null 2>&1; then
            echo "❌ ERROR: vercel.json has invalid JSON syntax!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            python3 -m json.tool vercel.json 2>&1 | head -n 20 || true
            echo ""
            echo "📄 vercel.json content:"
            cat vercel.json
            exit 1
          fi
          
          echo "✅ vercel.json schema is valid"
          echo "📄 vercel.json contents:"
          cat vercel.json
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Link Vercel Project
        working-directory: apps/${{ matrix.app.name }}
        run: |
          echo "🔗 Linking Vercel project..."
          # Create .vercel directory with project configuration
          mkdir -p .vercel
          cat > .vercel/project.json << EOF
          {
            "projectId": "${{ matrix.app.project-id }}",
            "orgId": "${{ env.VERCEL_ORG_ID }}"
          }
          EOF
          echo "✅ Project configuration created"
          echo "📁 Project ID: ${{ matrix.app.project-id }}"
          echo "📁 Org ID: ${{ env.VERCEL_ORG_ID }}"
          echo "📁 Configuration file:"
          cat .vercel/project.json

      - name: Deploy to Vercel Preview
        id: deploy
        working-directory: apps/${{ matrix.app.name }}
        run: |
          echo "🚀 Deploying ${{ matrix.app.name }} to Vercel Preview..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "💡 Vercel will build and deploy automatically"
          echo "💡 Deployment logs stream in real-time below..."
          echo "📁 Working directory: $(pwd)"
          echo "📁 App directory: apps/${{ matrix.app.name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Deploy to preview - Vercel will handle the build
          # Use --cwd to ensure we're in the right directory
          TEMP_LOG=$(mktemp)
          trap "rm -f $TEMP_LOG" EXIT
          
          set +e
          # Deploy with explicit project and org, and let Vercel handle the build
          # The vercel.json in the app directory will be used for configuration
          vercel deploy \
            --yes \
            --token=${{ env.VERCEL_TOKEN }} \
            --scope=${{ env.VERCEL_ORG_ID }} \
            --project=${{ matrix.app.project-id }} \
            2>&1 | tee "$TEMP_LOG"
          
          # Get exit code from vercel deploy (not tee)
          if [ "${PIPESTATUS[0]}" -ne 0 ]; then
            DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
          else
            DEPLOY_EXIT_CODE=0
          fi
          set -e
          
          # Extract deployment URL from captured output
          DEPLOYMENT_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' "$TEMP_LOG" | head -n 1 || echo "")
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ DEPLOYMENT FAILED: ${{ matrix.app.name }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Exit Code: $DEPLOY_EXIT_CODE"
            echo "App: ${{ matrix.app.name }}"
            echo "Project ID: ${{ matrix.app.project-id }}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🔍 FULL ERROR OUTPUT:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cat "$TEMP_LOG"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Check for specific common errors
            if grep -qi "_comment" "$TEMP_LOG" || grep -qi "additional property" "$TEMP_LOG" || grep -qi "should NOT have additional property" "$TEMP_LOG"; then
              echo "🚨 DETECTED: vercel.json Schema Validation Error"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "❌ Error: vercel.json contains invalid properties"
              echo ""
              echo "📋 Error Details:"
              grep -i "_comment\|additional property" "$TEMP_LOG" | head -n 5 || true
              echo ""
              echo "💡 Root Cause:"
              echo "  - '_comment' or other custom properties in vercel.json"
              echo "  - Vercel schema does not allow custom properties"
              echo ""
              echo "🔧 Fix Steps:"
              echo "  1. Check vercel.json file in apps/${{ matrix.app.name }}/vercel.json"
              echo "  2. Remove ALL '_comment' properties"
              echo "  3. Check Vercel Dashboard → Settings → Build and Deployment"
              echo "     - Remove any '_comment' fields from dashboard settings"
              echo "  4. Only use valid properties:"
              echo "     buildCommand, installCommand, framework, rewrites,"
              echo "     headers, routes, env, regions, github, public"
              echo ""
              echo "📄 Current vercel.json file:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cat vercel.json 2>/dev/null || echo "  (Could not read vercel.json)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo ""
            fi
            
            if grep -qi "project.*not found" "$TEMP_LOG" || grep -qi "project.*does not exist" "$TEMP_LOG" || grep -qi "project.*invalid" "$TEMP_LOG"; then
              echo "🚨 DETECTED: Project Configuration Error"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "❌ Error: Project ID not found or invalid"
              echo ""
              echo "💡 Fix Steps:"
              echo "  1. Verify project exists in Vercel dashboard"
              echo "  2. Check GitHub secret: VERCEL_PROJECT_ID_${{ matrix.app.name | upper | replace: '-', '_' }}"
              echo "  3. Current project ID: ${{ matrix.app.project-id }}"
              echo "  4. Ensure project ID matches Vercel dashboard"
              echo ""
            fi
            
            # Special check for os-admin
            if [ "${{ matrix.app.name }}" = "os-admin" ]; then
              echo "🚨 OS-ADMIN SPECIFIC TROUBLESHOOTING"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "⚠️  os-admin deployment failed!"
              echo ""
              echo "📋 Verification Checklist:"
              echo "  [ ] os-admin is in workflow matrix (line 42-43)"
              echo "  [ ] VERCEL_PROJECT_ID_OS_ADMIN secret is set in GitHub"
              echo "  [ ] Project exists in Vercel dashboard"
              echo "  [ ] Root directory is set to: apps/os-admin"
              echo "  [ ] Build command: cd ../.. && pnpm build --filter=os-admin"
              echo "  [ ] Install command: cd ../.. && pnpm install"
              echo ""
              echo "🔗 Direct Links:"
              echo "  - Vercel Project: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}"
              echo "  - Build Settings: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/settings/build-and-deployment"
              echo "  - Deployments: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/deployments"
              echo ""
            fi
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "💡 GENERAL TROUBLESHOOTING"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "App Name: ${{ matrix.app.name }}"
            echo "Project ID: ${{ matrix.app.project-id }}"
            echo "Org ID: ${{ env.VERCEL_ORG_ID }}"
            echo "Working Directory: $(pwd)"
            echo ""
            echo "🔗 Vercel Dashboard Links:"
            echo "  - Project Overview: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}"
            echo "  - Build Settings: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/settings/build-and-deployment"
            echo "  - Deployments: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/deployments"
            echo "  - Environment Variables: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/settings/environment-variables"
            echo ""
            echo "📊 Next Steps:"
            echo "  1. Review full error output above"
            echo "  2. Check Vercel dashboard for detailed build logs"
            echo "  3. Verify project configuration matches requirements"
            echo "  4. Remove any '_comment' properties from dashboard settings"
            echo "  5. Ensure all required environment variables are set"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            echo "deployment_failed=true" >> $GITHUB_OUTPUT
            echo "deployment_error_code=$DEPLOY_EXIT_CODE" >> $GITHUB_OUTPUT
            rm -f "$TEMP_LOG"
            exit $DEPLOY_EXIT_CODE
          fi
          
          # Extract deployment ID from output for build log access
          DEPLOYMENT_ID=$(grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' "$TEMP_LOG" | head -n 1 | sed 's|https://||' | sed 's|\.vercel\.app||' || echo "")
          
          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
            echo "deployment_failed=false" >> $GITHUB_OUTPUT
            echo "✅ Preview deployment URL: $DEPLOYMENT_URL"
            
            # Generate Vercel dashboard links for build logs
            if [ -n "$DEPLOYMENT_ID" ]; then
              VERCEL_LOG_URL="https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/$DEPLOYMENT_ID"
              echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
              echo "vercel_log_url=$VERCEL_LOG_URL" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Note: Deployment completed but URL not found in output."
            echo "🔗 Check Vercel dashboard for deployment URL: https://vercel.com/dashboard"
            echo "deployment_failed=false" >> $GITHUB_OUTPUT
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Build Logs Access:"
          echo "  🔗 Vercel Dashboard: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}"
          if [ -n "$DEPLOYMENT_ID" ]; then
            echo "  📝 Direct Build Logs: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}/$DEPLOYMENT_ID"
          fi
          echo "  📦 Project: ${{ matrix.app.name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          rm -f "$TEMP_LOG"

      - name: Comment PR with Deployment Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              (comment.body.includes('🚀 Preview Deployment') || comment.body.includes('❌ Deployment Failed'))
            );
            
            const url = '${{ steps.deploy.outputs.deployment_url }}';
            const appName = '${{ matrix.app.name }}';
            const deploymentFailed = '${{ steps.deploy.outputs.deployment_failed }}' === 'true';
            
            let body = '';
            let emoji = '🚀';
            let status = '';
            
            if (deploymentFailed) {
              emoji = '❌';
              status = '**Failed**';
              body = `${emoji} **Preview Deployment: ${appName}** - ${status}\n\n`;
              body += `🚀 **Deployment Error** (Exit code: ${{ steps.deploy.outputs.deployment_error_code }})\n`;
              body += `Check deployment logs above for details.\n\n`;
              body += `---\n\n`;
              body += `📊 [View Build Logs](#) | 🔗 [Vercel Dashboard](https://vercel.com/dashboard)\n`;
              body += `\n💡 **Troubleshooting:**\n`;
              body += `- Verify project ID is correct: \`${{ matrix.app.project-id }}\`\n`;
              body += `- Check VERCEL_TOKEN and VERCEL_ORG_ID secrets\n`;
              body += `- Ensure project exists in Vercel dashboard\n`;
              body += `- Check Vercel dashboard for detailed build logs\n`;
            } else {
              status = '**Success**';
              body = `${emoji} **Preview Deployment: ${appName}** - ${status}\n\n`;
              if (url) {
                body += `🔗 [View Preview](${url})\n\n`;
              } else {
                body += `📊 Check [Vercel Dashboard](https://vercel.com/dashboard) for deployment URL\n\n`;
              }
              body += `---\n\n✅ Deployment completed successfully!`;
            }
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: botComment.body + `\n\n${body}`
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: ✅ Verify Build Logs Access - ${{ matrix.app.name }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Complete: ${{ matrix.app.name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -n "${{ steps.deploy.outputs.deployment_url }}" ]; then
            echo "🔗 Preview URL: ${{ steps.deploy.outputs.deployment_url }}"
          else
            echo "📊 Check Vercel Dashboard for deployment URL"
          fi
          
          echo ""
          echo "📊 Build Logs Verification:"
          echo "  ✅ Build logs are available in Vercel Dashboard"
          echo "  🔗 Project Dashboard: https://vercel.com/${{ env.VERCEL_ORG_ID }}/${{ matrix.app.project-id }}"
          
          if [ -n "${{ steps.deploy.outputs.vercel_log_url }}" ]; then
            echo "  📝 Direct Build Logs: ${{ steps.deploy.outputs.vercel_log_url }}"
          fi
          
          echo ""
          echo "💡 How to Access Build Logs:"
          echo "  1. Go to Vercel Dashboard: https://vercel.com/dashboard"
          echo "  2. Select project: ${{ matrix.app.name }}"
          echo "  3. Click on the deployment to view build logs"
          echo "  4. Build logs show in real-time during deployment"
          echo ""
          echo "⏰ Completed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  notify-deployment:
    name: 📊 Deployment Summary & Error Report
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: always()
    
    steps:
      - name: Generate Deployment Summary with Error Tracking
        run: |
          echo "## 🚀 Preview Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if any deployments failed
          FAILED_JOBS=$(echo '${{ needs.deploy-preview.result }}' | grep -c "failure" || echo "0")
          if [ "$FAILED_JOBS" -gt "0" ]; then
            echo "⚠️ **Status:** Some deployments failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Failed deployments detected. Check individual job logs above for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status:** All deployments completed successfully" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ github.event.pull_request.head.ref }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📊 View Deployment Status & Build Logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 [Vercel Dashboard](https://vercel.com/dashboard) - View all deployments" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 [GitHub Actions Logs](#) - Real-time build logs above" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Build Logs in Vercel:** Available for each deployment" >> $GITHUB_STEP_SUMMARY
          echo "  - Click any deployment in Vercel dashboard" >> $GITHUB_STEP_SUMMARY
          echo "  - Build logs show installation, build, and deployment steps" >> $GITHUB_STEP_SUMMARY
          echo "  - Logs are streamed in real-time during deployment" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ [View Failed Deployments](#) - Check failed jobs above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 💡 Quick Tips" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build logs appear in **real-time** in GitHub Actions (above)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Each app deploys in parallel for faster completion" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Click on failed jobs above to see detailed error logs" >> $GITHUB_STEP_SUMMARY
          echo "- 🛠️ Common fixes: Check TypeScript errors, environment variables, dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📦 Deployed Apps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ m-marketplace" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ m-project-owner" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ m-permits-inspections" >> $GITHUB_STEP_SUMMARY
          echo "4. ✅ m-ops-services" >> $GITHUB_STEP_SUMMARY
          echo "5. ✅ m-architect" >> $GITHUB_STEP_SUMMARY
          echo "6. ✅ os-pm" >> $GITHUB_STEP_SUMMARY
          echo "7. ✅ os-admin" >> $GITHUB_STEP_SUMMARY
          echo "8. ✅ m-estimation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$FAILED_JOBS" -gt "0" ]; then
            echo "### ❌ Error Management" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Review error logs in failed jobs above" >> $GITHUB_STEP_SUMMARY
            echo "2. Check for common issues (TypeScript, dependencies, env vars)" >> $GITHUB_STEP_SUMMARY
            echo "3. Fix issues and push to trigger new deployment" >> $GITHUB_STEP_SUMMARY
            echo "4. All logs are available in real-time above" >> $GITHUB_STEP_SUMMARY
          fi

