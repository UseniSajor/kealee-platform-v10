name: Deploy Command Center Workers

on:
  push:
    branches:
      - main
    paths:
      - 'packages/automation/**'
      - 'packages/database/prisma/schema.prisma'
      - '.github/workflows/deploy-command-center.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1 — Lint & Test
  # ────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kealee
          POSTGRES_PASSWORD: kealee_test
          POSTGRES_DB: kealee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kealee"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kealee:kealee_test@localhost:5432/kealee_test
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kealee/database db:generate

      - name: Build database package
        run: pnpm --filter @kealee/database run build

      - name: Build automation package
        run: pnpm --filter @kealee/automation run build

      - name: Verify build output
        run: |
          test -f packages/automation/dist/workers/index.js
          echo "Build verified: workers/index.js exists"

  # ────────────────────────────────────────────────────────────
  # Job 2 — Deploy to Railway
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: command-center-workers
