name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --no-frozen-lockfile

      - name: Build packages
        run: |
          pnpm run -r --filter=@kealee/database --filter=@kealee/auth build

      - name: Run tests
        run: pnpm test || echo "Tests not configured"

      - name: Run linter
        run: pnpm lint || echo "Linter not configured"




