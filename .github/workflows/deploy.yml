name: Deploy to Railway

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      promote:
        description: 'Promote from staging to production'
        required: false
        type: boolean
        default: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true pnpm install --frozen-lockfile

      - name: Build API
        run: |
          pnpm build --filter=@kealee/api

      - name: Setup Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
        run: |
          railway up --service api-staging --detach

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        run: |
          railway up --service api-production --detach

  promote-to-production:
    runs-on: ubuntu-latest
    name: Promote Staging to Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote == true
    needs: build-and-deploy
    
    steps:
      - name: Setup Railway CLI
        run: |
          npm install -g @railway/cli

      - name: Promote Staging Deployment
        run: |
          railway promote --service api-production --from api-staging

