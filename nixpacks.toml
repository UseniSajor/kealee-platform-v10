# Nixpacks configuration for Railway — monorepo root
# All services share this install phase. Build + start are defined per-service
# in each apps/*/railway.toml via buildCommand/startCommand.
# API service uses the [phases.build] + [start] below.
# Portal apps override those via their railway.toml.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.setup.env]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
NODE_ENV = "production"

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@8.15.9 --activate",
  "pnpm install --no-frozen-lockfile",
  "pnpm --filter @kealee/database db:generate"
]

[phases.build]
cmds = [
  "pnpm build --filter=@kealee/api"
]

[start]
cmd = "cd services/api && pnpm start"
