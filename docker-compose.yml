version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kealee-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: kealee
      POSTGRES_PASSWORD: kealee_dev
      POSTGRES_DB: kealee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kealee"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kealee-redis-dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API Service
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: kealee-api-dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kealee:kealee_dev@postgres:5432/kealee
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      RESEND_API_KEY: ${RESEND_API_KEY:-placeholder}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-placeholder}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker Service
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: kealee-worker-dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kealee:kealee_dev@postgres:5432/kealee
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "worker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
