version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kealee-postgres
    environment:
      POSTGRES_USER: kealee
      POSTGRES_PASSWORD: kealee_dev
      POSTGRES_DB: kealee
    ports:
      # 5432 is commonly used by local Postgres on Windows; use 5433 to avoid conflicts
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kealee"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kealee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
