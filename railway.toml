# Railway Configuration for Kealee Platform MONOREPO
# NOTE: Service-level railway.json files override these settings
# Each service has: services/{name}/railway.json or apps/{name}/railway.json
# NIXPACKS auto-detects: Node.js + pnpm + TypeScript + Next.js

[env]
NODE_ENV = "production"
APP_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"
SUPABASE_URL = "https://rkreqfpkxavqpsqexbfs.supabase.co"
API_BASE_URL = "https://api.kealee.com"

# ============================================================================
# SERVICE: web-main (Next.js frontend with standalone build)
# Root Directory: apps/web-main
# Builder: NIXPACKS
# Runs: Node.js server from .next/standalone/
# ============================================================================
[services.web-main]
name = "web-main"

[services.web-main.build]
builder = "NIXPACKS"

[services.web-main.deploy]
startCommand = "node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ============================================================================
# SERVICE: kealee-api (Fastify REST API backend)
# Root Directory: services/api
# Builder: NIXPACKS
# Runs: Node.js compiled TypeScript with Fastify
# ============================================================================
[services.kealee-api]
name = "kealee-api"

[services.kealee-api.build]
builder = "NIXPACKS"

[services.kealee-api.deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ============================================================================
# SERVICE: worker (BullMQ background job processor)
# Root Directory: services/worker
# Builder: NIXPACKS
# Runs: Node.js compiled TypeScript with BullMQ workers
# ============================================================================
[services.worker]
name = "worker"

[services.worker.build]
builder = "NIXPACKS"

[services.worker.deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# IMPORTANT: Set these in Railway dashboard Variables section
# - DATABASE_URL (required)
# - REDIS_URL (optional, falls back to localhost)
# - SUPABASE_SERVICE_ROLE_KEY (required)
# - SUPABASE_ANON_KEY (required)
# - STRIPE_SECRET_KEY (required)
# - ANTHROPIC_API_KEY (required)
# - All other service credentials (Resend, Twilio, etc.)
