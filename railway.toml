# Railway Configuration for Kealee Platform MONOREPO
# Each service uses its own Dockerfile and configuration
# Root [build] is NOT USED - each service must define its own build config

[env]
NODE_ENV = "production"
APP_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"
SUPABASE_URL = "https://rkreqfpkxavqpsqexbfs.supabase.co"
API_BASE_URL = "https://api.kealee.com"

# ============================================================================
# SERVICE: web-main (Next.js frontend)
# ============================================================================
[services.web-main]
name = "web-main"

[services.web-main.build]
builder = "dockerfile"
dockerfile = "apps/web-main/Dockerfile"
contextDir = "."
# Docker handles build via Dockerfile - no custom buildCommand needed
# CRITICAL: This is the ONLY Dockerfile for web-main - NOT m-marketplace (was renamed from m-marketplace to web-main)
# Force Railway to re-read config: 2026-04-20T16:31:00Z (force rebuild after inline start.sh fix)

[services.web-main.deploy]
# startCommand set in Railway dashboard (not locked here - allows editing)
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ============================================================================
# SERVICE: kealee-api (Fastify backend)
# ============================================================================
[services.kealee-api.build]
dockerfile = "services/api/Dockerfile"
contextDir = "."

[services.kealee-api.deploy]
# startCommand set in Railway dashboard (not locked here - allows editing)
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ============================================================================
# SERVICE: worker (BullMQ job processor)
# ============================================================================
[services.worker.build]
dockerfile = "services/worker/Dockerfile"
contextDir = "."

[services.worker.deploy]
# startCommand set in Railway dashboard (not locked here - allows editing)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# IMPORTANT: Set these in Railway dashboard Variables section
# - DATABASE_URL (required)
# - REDIS_URL (optional, falls back to localhost)
# - SUPABASE_SERVICE_ROLE_KEY (required)
# - SUPABASE_ANON_KEY (required)
# - STRIPE_SECRET_KEY (required)
# - ANTHROPIC_API_KEY (required)
# - All other service credentials (Resend, Twilio, etc.)
