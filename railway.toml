# Railway Configuration for Kealee Platform MONOREPO
# Service-level railway.toml files (in each app/service dir) define build+start per service.
# This root file sets shared env and per-service overrides where needed.

[env]
NODE_ENV = "production"
APP_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"
SUPABASE_URL = "https://rkreqfpkxavqpsqexbfs.supabase.co"
API_BASE_URL = "https://api.kealee.com"

# ============================================================================
# SERVICE: web-main (Next.js frontend)
# ============================================================================
[services.web-main]
name = "web-main"

[services.web-main.build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/web-main"
watchPatterns = ["apps/web-main/**", "packages/**"]

[services.web-main.deploy]
startCommand = "cd apps/web-main && node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ============================================================================
# SERVICE: kealee-api (Fastify backend)
# ============================================================================
[services.kealee-api.build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && DATABASE_URL='postgresql://placeholder:placeholder@localhost:5432/placeholder' pnpm --filter @kealee/database db:generate && pnpm turbo build --filter=./services/api"
watchPatterns = ["services/api/**", "packages/**"]

[services.kealee-api.deploy]
startCommand = "cd services/api && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ============================================================================
# SERVICE: worker (BullMQ job processor)
# ============================================================================
[services.worker.build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && DATABASE_URL='postgresql://placeholder:placeholder@localhost:5432/placeholder' pnpm --filter @kealee/database db:generate && pnpm turbo build --filter=./services/worker"
watchPatterns = ["services/worker/**", "packages/**"]

[services.worker.deploy]
startCommand = "cd services/worker && node dist/index.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
