# Railway Configuration for Kealee Platform
# IMPORTANT: This is a MONOREPO with multiple services
# Service-specific configuration is set per-service in Railway dashboard:
# - web-main: startCommand="pnpm start", healthcheckPath="/"
# - kealee-api: startCommand="node dist/index.js", healthcheckPath="/health"
# - other services: custom per service

[build]
# Use our custom Dockerfile per service
dockerfile = "Dockerfile"
contextDir = "."

[deploy]
# Deployment settings (can be overridden per-service in dashboard)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables
[env]
NODE_ENV = "production"
PORT = "3000"
APP_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"
SUPABASE_URL = "https://rkreqfpkxavqpsqexbfs.supabase.co"
API_BASE_URL = "https://api.kealee.com"

# IMPORTANT: Set these in Railway dashboard Variables section
# DATABASE_URL = set in Railway dashboard (required)
# REDIS_URL = set in Railway dashboard (optional, falls back to localhost)
# SUPABASE_SERVICE_ROLE_KEY = set in Railway dashboard (required)
# SUPABASE_ANON_KEY = set in Railway dashboard (required)
# All other service credentials (Stripe, Anthropic, etc.) in Variables section
