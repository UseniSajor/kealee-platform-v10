# Railway Configuration for Kealee Platform MONOREPO
# Each service uses its own Dockerfile and configuration

[build]
dockerfile = "Dockerfile"
contextDir = "."

[env]
NODE_ENV = "production"
APP_ENV = "production"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PRISMA_CLIENT_ENGINE_TYPE = "binary"
SUPABASE_URL = "https://rkreqfpkxavqpsqexbfs.supabase.co"
API_BASE_URL = "https://api.kealee.com"

# ============================================================================
# SERVICE: web-main (Next.js frontend)
# ============================================================================
[services.web-main]
[services.web-main.build]
builder = "NIXPACKS"
buildCommand = "corepack enable && corepack prepare pnpm@8.15.9 --activate && pnpm install --no-frozen-lockfile && pnpm turbo build --filter=./apps/web-main"
watchPatterns = ["apps/web-main/**", "packages/**"]

[services.web-main.deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# ============================================================================
# SERVICE: kealee-api (Fastify backend)
# ============================================================================
[services.kealee-api]
[services.kealee-api.deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ============================================================================
# SERVICE: worker (BullMQ job processor)
# ============================================================================
[services.worker]
[services.worker.deploy]
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# IMPORTANT: Set these in Railway dashboard Variables section
# - DATABASE_URL (required)
# - REDIS_URL (optional, falls back to localhost)
# - SUPABASE_SERVICE_ROLE_KEY (required)
# - SUPABASE_ANON_KEY (required)
# - STRIPE_SECRET_KEY (required)
# - ANTHROPIC_API_KEY (required)
# - All other service credentials (Resend, Twilio, etc.)
