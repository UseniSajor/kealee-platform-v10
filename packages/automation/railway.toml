# KEALEE COMMAND CENTER WORKERS - RAILWAY CONFIGURATION
# This is a long-running worker process, NOT an HTTP service.
# No healthcheck path — Railway monitors process liveness instead.

[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
# Single instance — BullMQ handles concurrency within the process.
# Scale to 2+ replicas only if queue depth warrants it.
numReplicas = 1

# No healthcheckPath — workers don't expose HTTP.
# Railway will restart the process if it exits unexpectedly.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.env]
NODE_ENV = "production"
